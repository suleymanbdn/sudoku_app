name: sudoku
description: "Classic 9x9 Sudoku with color themes, notes mode, and difficulty levels."
publish_to: "none"

version: 1.0.39+40

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  google_fonts: ^6.2.1
  flutter_riverpod: ^2.6.1
  confetti: ^0.8.0
  shared_preferences: ^2.5.3
  in_app_update: ^4.2.5
  url_launcher: ^6.3.2
  firebase_core: ^3.8.1
  cloud_firestore: ^5.6.0
  uuid: ^4.5.1
  in_app_purchase: ^3.2.3
  firebase_auth: ^5.7.0
  flutter_secure_storage: ^10.0.0
  firebase_app_check: ^0.3.2+10
  google_sign_in: ^6.2.2
  audioplayers: ^6.1.0
  path_provider: ^2.1.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

flutter_launcher_icons:
  android: true
  ios: true
  image_path: branding/app_icon.png
  min_sdk_android: 21
  adaptive_icon_background: "#2A1A45"
  adaptive_icon_foreground: branding/app_icon.png
